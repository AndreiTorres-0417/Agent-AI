<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Academic Review Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;650&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=20260605-1" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Application status">
        <div>
          <h1>Academic Review Agent</h1>
        </div>
        <div class="top-controls">
          <label class="model-switch" for="modelSelect">
            <span>AI Model</span>
            <select id="modelSelect">
              <option value="openai:gpt-4.1-mini">OpenAI GPT-4.1 mini</option>
              <option value="gemma3:1b">Local Gemma 3 1B</option>
            </select>
          </label>
          <div class="status-pill" id="healthStatus">Checking API...</div>
        </div>
      </section>

      <section class="workspace">
        <aside class="chat-panel" aria-label="Academic paper assistant chat">
          <div class="panel-header">
            <div>
              <h2>Review Discussion</h2>
            </div>
            <button class="ghost-button" id="resetBtn" type="button">Reset</button>
          </div>

          <div class="messages" id="messages" aria-live="polite"></div>

          <form class="composer" id="chatForm">
            <textarea
              id="chatInput"
              autocomplete="off"
              placeholder="Ask about your academic paper..."
              rows="1"
              required
            ></textarea>
            <button type="submit">Send</button>
          </form>
        </aside>

        <section class="review-panel" aria-label="Document review">
          <div class="panel-header">
            <div>
              <h2>Draft Review</h2>
            </div>
            <div class="tabs" role="tablist" aria-label="Input mode">
              <button class="tab active" id="textTab" type="button">Text</button>
              <button class="tab" id="docxTab" type="button">DOCX</button>
            </div>
          </div>

          <form class="analysis-form" id="textForm">
            <textarea
              id="draftText"
              placeholder="Paste your academic draft here..."
              minlength="20"
            ></textarea>
            <button class="primary-action" type="submit">Analyze Draft</button>
          </form>

          <form class="analysis-form hidden" id="docxForm">
            <label class="file-drop">
              <span id="fileLabel">Choose a .docx file</span>
              <input id="docxFile" type="file" accept=".docx" required />
            </label>
            <button class="primary-action" type="submit">Analyze Draft</button>
          </form>

          <div class="result-state" id="resultState">
            <span class="mark">Ready</span>
            <p>Analyze a draft, then discuss the results with the assistant.</p>
          </div>

          <div class="thinking hidden" id="thinkingStatus" aria-live="polite">
            <div class="pulse-bars" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div>
              <span class="mark" id="thinkingStep">Reading draft</span>
              <p id="thinkingDetail">Preparing the academic review.</p>
            </div>
          </div>

          <div class="results hidden" id="results"></div>
        </section>
      </section>
    </main>

    <script src="/static/app.js?v=20260605-1"></script>
  </body>
</html>
